<!DOCTYPE html>
<html lang="en" data-theme="midnight">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Producer Daily">
<title>Producer Daily</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* ---------- MIDNIGHT (default) ---------- */
  [data-theme="midnight"] {
    --bg: #0e0e10; --surface: #1a1a1d; --surface2: #26262b;
    --text: #f0f0ee; --text2: #a0a09c; --text3: #6b6b67;
    --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.16);
    --accent: #7C73E6; --accent-light: #26215C; --accent-dark: #CECBF6;
    --green: #2BBD8B; --amber: #F2B33D; --red: #F0635F;
    --chart-grid: rgba(255,255,255,0.06);
  }

  /* ---------- DUSK (dark warm orange) ---------- */
  [data-theme="dusk"] {
    --bg: #16100b; --surface: #221912; --surface2: #2e2118;
    --text: #f6ede2; --text2: #b89a80; --text3: #806750;
    --border: rgba(255,180,120,0.10); --border2: rgba(255,180,120,0.22);
    --accent: #f0883e; --accent-light: #3a2414; --accent-dark: #ffb877;
    --green: #b0a04a; --amber: #f0a83e; --red: #e0654c;
    --chart-grid: rgba(255,180,120,0.07);
  }

  /* ---------- IMAGE THEMES (frosted glass over photo) ---------- */
  [data-theme="golden"] {
    --bg: #1a130a; --surface: rgba(26,18,9,0.55); --surface2: rgba(54,40,20,0.5);
    --text: #fff7ec; --text2: #dcc6a6; --text3: #a89070;
    --border: rgba(255,210,150,0.16); --border2: rgba(255,210,150,0.30);
    --accent: #e8a23d; --accent-light: rgba(232,162,61,0.20); --accent-dark: #ffd28a;
    --green: #84b86a; --amber: #e8a23d; --red: #e0654c;
    --chart-grid: rgba(255,255,255,0.08);
  }
  [data-theme="cabin"] {
    --bg: #0d1714; --surface: rgba(13,23,20,0.55); --surface2: rgba(28,46,40,0.5);
    --text: #effaf5; --text2: #aecabf; --text3: #7a958a;
    --border: rgba(150,230,200,0.16); --border2: rgba(150,230,200,0.30);
    --accent: #4fc89e; --accent-light: rgba(79,200,158,0.20); --accent-dark: #97f0cf;
    --green: #4fc89e; --amber: #e8c05a; --red: #e87a6a;
    --chart-grid: rgba(255,255,255,0.08);
  }
  [data-theme="misty"] {
    --bg: #14110f; --surface: rgba(20,17,15,0.55); --surface2: rgba(44,36,32,0.5);
    --text: #f6efe9; --text2: #c8b3a6; --text3: #94817540;
    --text3: #948175; --border: rgba(230,160,140,0.16); --border2: rgba(230,160,140,0.30);
    --accent: #d9694c; --accent-light: rgba(217,105,76,0.20); --accent-dark: #f3a18c;
    --green: #7faa6e; --amber: #e0a24c; --red: #d9694c;
    --chart-grid: rgba(255,255,255,0.08);
  }
  [data-theme="green"] {
    --bg: #10160c; --surface: rgba(16,22,12,0.55); --surface2: rgba(34,46,26,0.5);
    --text: #f2f9ea; --text2: #c0d2ab; --text3: #8a9c76;
    --border: rgba(180,230,140,0.16); --border2: rgba(180,230,140,0.30);
    --accent: #7fbf5c; --accent-light: rgba(127,191,92,0.20); --accent-dark: #b6e88a;
    --green: #7fbf5c; --amber: #e0bf52; --red: #e0795c;
    --chart-grid: rgba(255,255,255,0.08);
  }

  :root { --radius: 12px; --radius-lg: 16px; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 48px;
    -webkit-text-size-adjust: 100%;
    transition: background 0.3s, color 0.3s;
  }
  body.image-theme {
    background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.66)), var(--bg-image);
    background-size: cover; background-position: center; background-attachment: fixed;
  }
  body.image-theme .top-bar, body.image-theme .metric, body.image-theme .hab-row,
  body.image-theme .week-card, body.image-theme .dash-head, body.image-theme .todo-item,
  body.image-theme .bot, body.image-theme .ai-out, body.image-theme .todo-input,
  body.image-theme .affirm-card {
    backdrop-filter: blur(13px); -webkit-backdrop-filter: blur(13px);
  }

  .top-bar {
    background: var(--surface); border-bottom: 0.5px solid var(--border);
    padding: 16px 16px 12px; position: sticky; top: 0; z-index: 20;
  }
  .top-inner { max-width: 640px; margin: 0 auto; }
  .top-row { display: flex; justify-content: space-between; align-items: center; }

  h1 { font-size: 20px; font-weight: 600; color: var(--text); }
  .date-label { font-size: 13px; color: var(--text2); margin-top: 2px; }

  .nav-group { display: flex; gap: 6px; align-items: center; }

  button {
    background: var(--surface2); border: none; border-radius: 8px; color: var(--text);
    cursor: pointer; font-size: 13px; padding: 8px 12px; font-family: inherit;
    font-weight: 500; -webkit-tap-highlight-color: transparent; transition: opacity 0.1s, background 0.15s;
  }
  button:active { opacity: 0.7; }

  .theme-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
  .theme-chip {
    flex-shrink: 0; display: flex; align-items: center; gap: 7px; padding: 6px 12px;
    border-radius: 999px; font-size: 12px; font-weight: 600; border: 1.5px solid var(--border);
    background: var(--surface2); color: var(--text2);
  }
  .theme-chip.active { border-color: var(--accent); color: var(--text); }
  .swatch { width: 13px; height: 13px; border-radius: 50%; flex-shrink: 0; background-size: cover; background-position: center; }

  .content { padding: 16px; max-width: 640px; margin: 0 auto; }

  .metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
  .metric { background: var(--surface); border-radius: var(--radius); padding: 12px 14px; border: 0.5px solid var(--border); }
  .metric-label { font-size: 11px; color: var(--text2); margin-bottom: 4px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; }
  .metric-value { font-size: 24px; font-weight: 600; color: var(--text); }

  .progress-bar-wrap { height: 8px; border-radius: 999px; background: var(--surface2); overflow: hidden; margin-bottom: 6px; }
  .progress-bar-fill { height: 100%; border-radius: 999px; background: var(--accent); transition: width 0.4s ease; width: 0%; }
  .progress-label { font-size: 12px; color: var(--text3); margin-bottom: 18px; }

  .section-title {
    font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase;
    letter-spacing: 0.07em; margin-bottom: 8px; margin-top: 22px; display: flex; align-items: center; gap: 6px;
  }

  .hab-row {
    display: flex; align-items: center; gap: 12px; padding: 13px 14px; margin-bottom: 6px;
    border-radius: var(--radius); border: 0.5px solid var(--border); background: var(--surface);
    cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent; min-height: 52px; transition: transform 0.1s;
  }
  .hab-row:active { opacity: 0.7; transform: scale(0.985); }
  .hab-row.bonus { border-style: dashed; background: var(--surface2); }
  .hab-row.morning {
    border: 2px solid color-mix(in srgb, var(--accent) 60%, transparent);
    box-shadow: 0 0 0 1px color-mix(in srgb, var(--accent) 22%, transparent),
                0 0 18px -2px color-mix(in srgb, var(--accent) 55%, transparent);
  }

  .hab-check {
    width: 26px; height: 26px; border-radius: 8px; border: 1.5px solid var(--border2);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    transition: all 0.15s; color: white; font-size: 14px;
  }
  .hab-check.done { background: var(--accent); border-color: var(--accent); }

  .hab-emoji { font-size: 20px; flex-shrink: 0; line-height: 1; }
  .hab-label { font-size: 15px; color: var(--text); flex: 1; line-height: 1.3; }
  .hab-label.done { color: var(--text3); text-decoration: line-through; }

  .key-badge { font-size: 10px; background: var(--accent-light); color: var(--accent-dark); padding: 3px 8px; border-radius: 20px; flex-shrink: 0; font-weight: 700; }

  .week-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 8px; }
  .week-top { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .week-emoji { font-size: 20px; }
  .week-label { font-size: 15px; flex: 1; font-weight: 500; }
  .week-count { font-size: 13px; color: var(--text2); font-weight: 600; }
  .week-bar-wrap { height: 10px; border-radius: 999px; background: var(--surface2); overflow: hidden; margin-bottom: 10px; }
  .week-bar-fill { height: 100%; border-radius: 999px; background: var(--accent); transition: width 0.4s ease; }
  .week-bar-fill.full { background: var(--green); }
  .week-toggle { display: flex; align-items: center; justify-content: space-between; }
  .week-toggle-label { font-size: 12px; color: var(--text3); }
  .tick-btn { padding: 7px 14px; font-size: 12px; font-weight: 600; border-radius: 8px; }
  .tick-btn.on { background: var(--accent); color: #fff; }

  .todo-input-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .todo-input { flex: 1; padding: 12px 14px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--surface); color: var(--text); font-size: 15px; font-family: inherit; }
  .todo-input:focus { outline: none; border-color: var(--accent); }
  .todo-add { background: var(--accent); color: #fff; padding: 12px 16px; font-weight: 600; }
  .todo-item { display: flex; align-items: center; gap: 12px; padding: 12px 14px; margin-bottom: 6px; border-radius: var(--radius); border: 0.5px solid var(--border); background: var(--surface); -webkit-tap-highlight-color: transparent; }
  .todo-check { width: 22px; height: 22px; border-radius: 6px; border: 1.5px solid var(--border2); flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: #fff; cursor: pointer; }
  .todo-check.done { background: var(--accent); border-color: var(--accent); }
  .todo-text { flex: 1; font-size: 15px; line-height: 1.3; word-break: break-word; }
  .todo-text.done { color: var(--text3); text-decoration: line-through; }
  .todo-del { background: none; padding: 6px 8px; color: var(--text3); font-size: 16px; }
  .todo-empty { font-size: 13px; color: var(--text3); padding: 4px 2px 8px; }

  .dash-head { display: flex; align-items: center; justify-content: space-between; cursor: pointer; background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px; -webkit-tap-highlight-color: transparent; }
  .dash-head h2 { font-size: 15px; font-weight: 600; }
  .dash-body { display: none; padding-top: 12px; }
  .dash-body.open { display: block; }
  .chart-tabs { display: flex; gap: 6px; margin-bottom: 12px; }
  .chart-tab { flex: 1; padding: 9px; font-size: 12px; font-weight: 600; border-radius: 8px; }
  .chart-tab.active { background: var(--accent); color: #fff; }
  .chart-wrap { position: relative; width: 100%; height: 190px; margin-bottom: 14px; }
  .heatmap { display: none; }
  .heat-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin: 0 0 6px; }
  .heat-cell { aspect-ratio: 1; border-radius: 5px; background: var(--surface2); }
  .heat-day { font-size: 9px; text-align: center; color: var(--text3); font-weight: 600; }
  .heat-legend { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text3); justify-content: flex-end; margin-top: 8px; margin-bottom: 8px; }
  .heat-legend .sq { width: 11px; height: 11px; border-radius: 3px; }

  .ai-btn { width: 100%; background: var(--accent); color: #fff; padding: 13px; font-weight: 600; font-size: 14px; border-radius: var(--radius); margin-bottom: 12px; }
  .ai-out { display: none; background: var(--accent-light); border-radius: var(--radius); padding: 16px; line-height: 1.55; }
  .ai-out.show { display: block; }
  .ai-out h3 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--accent-dark); margin-bottom: 10px; }
  .ai-line { font-size: 14px; color: var(--text); margin-bottom: 8px; }
  .ai-line b { color: var(--text); }

  /* big affirmation */
  .affirm-card {
    margin-top: 14px; padding: 20px 18px; border-radius: var(--radius-lg);
    background: var(--accent-light); border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent);
    text-align: center;
  }
  .affirm-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--accent-dark); font-weight: 700; margin-bottom: 8px; }
  .affirm-text { font-size: 20px; line-height: 1.4; font-weight: 700; color: var(--text); }

  /* assistant */
  .bot { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 12px; }
  .bot-log { max-height: 260px; overflow-y: auto; margin-bottom: 10px; display: flex; flex-direction: column; gap: 8px; }
  .bot-msg { padding: 9px 12px; border-radius: 12px; font-size: 14px; line-height: 1.4; max-width: 88%; }
  .bot-msg.you { background: var(--accent); color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
  .bot-msg.bot { background: var(--surface2); color: var(--text); align-self: flex-start; border-bottom-left-radius: 4px; }
  .bot-input-row { display: flex; gap: 8px; }
  .bot-input { flex: 1; padding: 11px 13px; border-radius: 10px; border: 0.5px solid var(--border2); background: var(--surface); color: var(--text); font-size: 15px; font-family: inherit; }
  .bot-input:focus { outline: none; border-color: var(--accent); }
  .bot-send { background: var(--accent); color: #fff; padding: 11px 15px; font-weight: 600; border-radius: 10px; }
  .motivational { text-align: center; font-size: 13px; color: var(--text3); margin-bottom: 16px; font-style: italic; }
</style>
</head>
<body>

<div class="top-bar">
  <div class="top-inner">
    <div class="top-row">
      <div>
        <h1>🎛️ Producer Daily</h1>
        <p class="date-label" id="dateDisplay"></p>
      </div>
      <div class="nav-group">
        <button onclick="changeDay(-1)" aria-label="Previous day"><i class="ti ti-chevron-left"></i></button>
        <button onclick="goToday()">Today</button>
        <button onclick="changeDay(1)" aria-label="Next day"><i class="ti ti-chevron-right"></i></button>
      </div>
    </div>
    <div class="theme-row" id="themeRow"></div>
  </div>
</div>

<div class="content">

  <p class="motivational" id="motiveLine">Every day is a step closer 🚀</p>

  <div class="metrics">
    <div class="metric"><p class="metric-label">Today</p><p class="metric-value" id="todayScore">0%</p></div>
    <div class="metric"><p class="metric-label">7-day avg</p><p class="metric-value" id="weekAvg">0%</p></div>
    <div class="metric"><p class="metric-label">🔥 Streak</p><p class="metric-value" id="bestStreak">0d</p></div>
    <div class="metric"><p class="metric-label">✅ Keys done</p><p class="metric-value" id="habitsCount">0/0</p></div>
  </div>

  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressBar"></div></div>
  <p class="progress-label" id="progressLabel">0 of 0 complete</p>

  <p class="section-title">🔑 Morning keys</p>
  <div id="morningHabits"></div>

  <p class="section-title">🌅 Daily habits</p>
  <div id="dailyHabits"></div>

  <p class="section-title">📅 Weekly goals</p>
  <div id="weeklyHabits"></div>

  <p class="section-title">✨ Bonus</p>
  <div id="bonusHabits"></div>

  <p class="section-title">📝 To-do</p>
  <div class="todo-input-row">
    <input class="todo-input" id="todoInput" type="text" placeholder="Add a task..." onkeydown="if(event.key==='Enter')addTodo()">
    <button class="todo-add" onclick="addTodo()">Add</button>
  </div>
  <div id="todoList"></div>

  <p class="section-title">📊 Progress dashboard</p>
  <div class="dash-head" onclick="toggleDash()">
    <h2>View my progress</h2>
    <i class="ti ti-chevron-down" id="dashChevron"></i>
  </div>
  <div class="dash-body" id="dashBody">
    <div class="chart-tabs">
      <button class="chart-tab active" id="tab-bar" onclick="setChartView('bar')">Bar</button>
      <button class="chart-tab" id="tab-line" onclick="setChartView('line')">Line</button>
      <button class="chart-tab" id="tab-heatmap" onclick="setChartView('heatmap')">Heatmap</button>
    </div>
    <div class="chart-wrap" id="chartWrap"><canvas id="progressChart" role="img" aria-label="Habit completion over time"></canvas></div>
    <div class="heatmap" id="heatmap">
      <div class="heat-grid" id="heatGridDays"></div>
      <div class="heat-grid" id="heatGrid"></div>
      <div class="heat-legend"><span>Less</span><span class="sq" style="background:var(--surface2)"></span><span class="sq" style="background:color-mix(in srgb,var(--accent) 40%,var(--surface2))"></span><span class="sq" style="background:var(--accent)"></span><span>More</span></div>
    </div>
    <button class="ai-btn" onclick="runOverview()">🧠 Get my manager overview</button>
    <div class="ai-out" id="aiOut"></div>
  </div>

  <p class="section-title">🤖 Assistant</p>
  <div class="bot">
    <div class="bot-log" id="botLog"></div>
    <div class="bot-input-row">
      <input class="bot-input" id="botInput" type="text" placeholder="e.g. add cold shower to daily" onkeydown="if(event.key==='Enter')botSend()">
      <button class="bot-send" onclick="botSend()">Send</button>
    </div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
/* ---------- BUILT-IN HABITS ---------- */
const BUILTIN={
  morning:[
    {id:'morning_workout',label:'Workout / Climb / Run',emoji:'🏋️',key:true},
    {id:'morning_reel',label:'Post Instagram reel',emoji:'🎬',key:true},
    {id:'morning_piano',label:'Piano keys practice',emoji:'🎹',key:true},
    {id:'morning_song',label:'Produce & FINISH a song',emoji:'🎵',key:true},
  ],
  daily:[
    {id:'room',label:'Tidy room',emoji:'🧹'},
    {id:'sleep',label:'Early night (by midnight)',emoji:'🌙'},
    {id:'eat',label:'Eat healthy',emoji:'🥗'},
    {id:'sax',label:'Saxophone practice',emoji:'🎷'},
    {id:'listen',label:'Active listening',emoji:'🎧'},
  ],
  weekly:[
    {id:'email',label:'Email out demos',emoji:'📧',target:3},
    {id:'release',label:'Release a song',emoji:'🚀',target:1},
  ],
  bonus:[
    {id:'sug2',label:'Meditate',emoji:'🧘'},
    {id:'sug3',label:'Drink 2L water',emoji:'💧'},
    {id:'bonus_read',label:'Reading (15 min)',emoji:'📖'},
  ],
};

const THEMES=[

function loadData(){try{return JSON.parse(localStorage.getItem('producer_habits')||'{}');}catch(e){return {};}}
function saveData(d){try{localStorage.setItem('producer_habits',JSON.stringify(d));}catch(e){}}
function loadTodos(){try{return JSON.parse(localStorage.getItem('producer_todos')||'[]');}catch(e){return [];}}
function saveTodos(t){try{localStorage.setItem('producer_todos',JSON.stringify(t));}catch(e){}}
function loadTheme(){try{return localStorage.getItem('producer_theme')||'midnight';}catch(e){return 'midnight';}}
function saveTheme(t){try{localStorage.setItem('producer_theme',t);}catch(e){}}
function loadCustom(){try{var c=JSON.parse(localStorage.getItem('producer_custom')||'null');}catch(e){c=null;}
  if(!c) c={added:{morning:[],daily:[],weekly:[],bonus:[]},hidden:[],renamed:{}};
  c.added=c.added||{}; ['morning','daily','weekly','bonus'].forEach(function(s){c.added[s]=c.added[s]||[];});
  c.hidden=c.hidden||[]; c.renamed=c.renamed||{}; return c;}
function saveCustom(c){try{localStorage.setItem('producer_custom',JSON.stringify(c));}catch(e){}}

let data=loadData();
let todos=loadTodos();
let custom=loadCustom();
let chartView='bar';
let currentDate=new Date(); currentDate.setHours(0,0,0,0);

function dateKey(d){return d.toISOString().split('T')[0];}
function getDayData(d){const k=dateKey(d);if(!data[k])data[k]={};return data[k];}

/* ---------- EFFECTIVE HABIT LISTS (builtin + custom) ---------- */
function getSection(name){
  let list=BUILTIN[name].filter(function(h){return custom.hidden.indexOf(h.id)===-1;});
  list=list.concat(custom.added[name]||[]);
  return list.map(function(h){
    var lbl=custom.renamed[h.id]||h.label;
    return Object.assign({},h,{label:lbl});
  });
}
function core(){return getSection('morning').concat(getSection('daily'));}
function allHabits(){return getSection('morning').concat(getSection('daily'),getSection('weekly'),getSection('bonus'));}

/* ---------- THEME ---------- */
function applyTheme(id){
  if(!THEMES.some(function(t){return t.id===id;})) id='midnight';
  const t=THEMES.filter(function(x){return x.id===id;})[0];
  document.documentElement.setAttribute('data-theme',id);
  if(t.kind==='image'){
    document.documentElement.style.setProperty('--bg-image','url("'+t.img+'")');
    document.body.classList.add('image-theme');
  } else {
    document.body.classList.remove('image-theme');
    document.documentElement.style.removeProperty('--bg-image');
  }
  saveTheme(id); renderThemeRow(id);
  if(document.getElementById('dashBody').classList.contains('open')) refreshDash();
}
function renderThemeRow(active){
  document.getElementById('themeRow').innerHTML=THEMES.map(function(t){
    var sw=t.kind==='image'?'background-image:url(\''+t.swatch+'\')':'background:'+t.swatch;
    return '<div class="theme-chip'+(t.id===active?' active':'')+'" onclick="applyTheme(\''+t.id+'\')">'+
      '<span class="swatch" style="'+sw+'"></span>'+t.name+'</div>';
  }).join('');
}

/* ---------- TOGGLES ---------- */
function toggleHabit(id){const d=getDayData(currentDate);d[id]=!d[id];saveData(data);render();}
function changeDay(n){currentDate=new Date(currentDate);currentDate.setDate(currentDate.getDate()+n);render();}
function goToday(){currentDate=new Date();currentDate.setHours(0,0,0,0);render();}

/* ---------- SCORING (CORE = morning + daily) ---------- */
function calcScore(d){
  const C=core(); const dd=data[dateKey(d)]||{};
  const done=C.filter(function(h){return dd[h.id];}).length;
  return C.length>0?Math.round((done/C.length)*100):0;
}
function calcStreak(){
  let streak=0,d=new Date(currentDate);
  while(streak<365){if(calcScore(d)>=50){streak++;d.setDate(d.getDate()-1);}else break;}
  return streak;
}
function getMotiveLine(pct){
  if(pct===100) return "PERFECT DAY! You're built different 👑🔥";
  if(pct>=80) return "Almost there, don't stop now 💪";
  if(pct>=50) return "Halfway through, keep pushing 🎯";
  if(pct>0) return "Good start, keep the momentum going 🚀";
  return MOTIVES[new Date().getDay()%MOTIVES.length];
}

/* ---------- WEEK HELPERS (Mon start) ---------- */
function weekStart(d){const x=new Date(d);const day=(x.getDay()+6)%7;x.setDate(x.getDate()-day);x.setHours(0,0,0,0);return x;}
function weekDates(d){const s=weekStart(d);const out=[];for(let i=0;i<7;i++){const x=new Date(s);x.setDate(s.getDate()+i);out.push(x);}return out;}
function weeklyCount(id){return weekDates(currentDate).filter(function(d){return (data[dateKey(d)]||{})[id];}).length;}

/* ---------- RENDER HABITS ---------- */
function makeHabitHTML(h,dd,cls){
  const done=!!dd[h.id];
  return '<div class="hab-row'+(cls?' '+cls:'')+'" onclick="toggleHabit(\''+h.id+'\')">'+
    '<div class="hab-check'+(done?' done':'')+'">'+(done?'<i class="ti ti-check" aria-hidden="true"></i>':'')+'</div>'+
    '<span class="hab-emoji">'+h.emoji+'</span>'+
    '<span class="hab-label'+(done?' done':'')+'">'+h.label+'</span>'+
    (h.key?'<span class="key-badge">🔑 key</span>':'')+
  '</div>';
}
function makeWeeklyHTML(h){
  const target=h.target||1;
  const c=weeklyCount(h.id), pct=Math.min(100,Math.round((c/target)*100)), full=c>=target;
  const onToday=!!getDayData(currentDate)[h.id];
  const isToday=currentDate.toDateString()===new Date().toDateString();
  return '<div class="week-card">'+
    '<div class="week-top"><span class="week-emoji">'+h.emoji+'</span>'+
      '<span class="week-label">'+h.label+'</span>'+
      '<span class="week-count">'+c+'/'+target+' this week'+(full?' ✅':'')+'</span></div>'+
    '<div class="week-bar-wrap"><div class="week-bar-fill'+(full?' full':'')+'" style="width:'+pct+'%"></div></div>'+
    '<div class="week-toggle"><span class="week-toggle-label">Did it '+(isToday?'today':'this day')+'?</span>'+
      '<button class="tick-btn'+(onToday?' on':'')+'" onclick="toggleHabit(\''+h.id+'\')">'+(onToday?'✓ Done':'Mark done')+'</button></div>'+
  '</div>';
}

/* ---------- TO-DO ---------- */
function addTodo(){
  const inp=document.getElementById('todoInput'); const v=inp.value.trim(); if(!v)return;
  todos.push({id:Date.now()+''+Math.floor(Math.random()*999),text:v,done:false});
  saveTodos(todos); inp.value=''; renderTodos();
}
function toggleTodo(id){const t=todos.find(function(x){return x.id===id;});if(t){t.done=!t.done;saveTodos(todos);renderTodos();}}
function delTodo(id){todos=todos.filter(function(x){return x.id!==id;});saveTodos(todos);renderTodos();}
function renderTodos(){
  const el=document.getElementById('todoList');
  if(!todos.length){el.innerHTML='<p class="todo-empty">Nothing here yet — add a task above.</p>';return;}
  el.innerHTML=todos.map(function(t){
    return '<div class="todo-item">'+
      '<div class="todo-check'+(t.done?' done':'')+'" onclick="toggleTodo(\''+t.id+'\')">'+(t.done?'<i class="ti ti-check"></i>':'')+'</div>'+
      '<span class="todo-text'+(t.done?' done':'')+'">'+escapeHtml(t.text)+'</span>'+
      '<button class="todo-del" onclick="delTodo(\''+t.id+'\')" aria-label="Delete">✕</button>'+
    '</div>';
  }).join('');
}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}

/* ---------- DASHBOARD ---------- */
function toggleDash(){
  const b=document.getElementById('dashBody'), c=document.getElementById('dashChevron');
  b.classList.toggle('open');
  c.className='ti '+(b.classList.contains('open')?'ti-chevron-up':'ti-chevron-down');
  if(b.classList.contains('open')) refreshDash();
}
function setChartView(v){
  chartView=v;
  ['bar','line','heatmap'].forEach(function(t){document.getElementById('tab-'+t).classList.toggle('active',t===v);});
  document.getElementById('chartWrap').style.display=v==='heatmap'?'none':'block';
  document.getElementById('heatmap').style.display=v==='heatmap'?'block':'none';
  refreshDash();
}
function refreshDash(){ if(chartView==='heatmap') renderHeatmap(); else renderChart(); }

let chart;
function renderChart(){
  if(typeof Chart==='undefined') return;
  const labels=[],scores=[];
  for(let i=6;i>=0;i--){const d=new Date(currentDate);d.setDate(d.getDate()-i);labels.push(d.toLocaleDateString('en-GB',{weekday:'short'}));scores.push(calcScore(d));}
  if(chart)chart.destroy();
  const cs=getComputedStyle(document.documentElement);
  const accent=cs.getPropertyValue('--accent').trim();
  const tickColor=cs.getPropertyValue('--text2').trim();
  const gridColor=cs.getPropertyValue('--chart-grid').trim();
  const amber=cs.getPropertyValue('--amber').trim();
  const red=cs.getPropertyValue('--red').trim();
  chart=new Chart(document.getElementById('progressChart'),{
    type:chartView==='line'?'line':'bar',
    data:{labels:labels,datasets:[{label:'%',data:scores,
      backgroundColor:chartView==='line'?'transparent':scores.map(function(s){return s>=80?accent:s>=50?amber:red;}),
      borderColor:accent,borderWidth:chartView==='line'?2.5:0,tension:0.35,fill:false,pointBackgroundColor:accent,pointRadius:4,borderRadius:6}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{y:{min:0,max:100,ticks:{callback:function(v){return v+'%';},font:{size:10},color:tickColor},grid:{color:gridColor}},
              x:{ticks:{font:{size:11},color:tickColor},grid:{display:false}}}}
  });
}
function renderHeatmap(){
  const days=['M','T','W','T','F','S','S'];
  document.getElementById('heatGridDays').innerHTML=days.map(function(d){return '<div class="heat-day">'+d+'</div>';}).join('');
  const cs=getComputedStyle(document.documentElement);
  const accent=cs.getPropertyValue('--accent').trim();
  const cells=[];
  const start=new Date(weekStart(currentDate)); start.setDate(start.getDate()-28);
  for(let i=0;i<35;i++){
    const d=new Date(start);d.setDate(start.getDate()+i);
    const s=calcScore(d);
    const op=s===0?0:0.2+(s/100)*0.8;
    const bg=s===0?'var(--surface2)':'color-mix(in srgb, '+accent+' '+Math.round(op*100)+'%, var(--surface2))';
    cells.push('<div class="heat-cell" style="background:'+bg+'" title="'+d.toLocaleDateString('en-GB')+': '+s+'%"></div>');
  }
  document.getElementById('heatGrid').innerHTML=cells.join('');
}

/* ---------- MANAGER OVERVIEW ---------- */
function overviewStats(){
  const C=core();
  const last7=[]; for(let i=6;i>=0;i--){const d=new Date(currentDate);d.setDate(d.getDate()-i);last7.push(d);}
  const rate={}; C.forEach(function(h){rate[h.id]=last7.filter(function(d){return (data[dateKey(d)]||{})[h.id];}).length;});
  const avg=Math.round(last7.reduce(function(a,d){return a+calcScore(d);},0)/7);
  const sorted=C.slice().sort(function(a,b){return rate[a.id]-rate[b.id];});
  return {C:C,rate:rate,avg:avg,weakest:sorted[0],strongest:sorted[sorted.length-1],
    streak:calcStreak(),emailC:weeklyCount('email'),releaseC:weeklyCount('release')};
}
function affirmFor(avg){
  if(avg>=85) return "You're operating at a pro level. This is how careers get built — don't let off the gas. 🎛️👑";
  if(avg>=60) return "Solid week. You're consistent — sharpen the weak spot and you're untouchable. 💎";
  if(avg>=35) return "Foundations are there. Lock in the mornings and everything follows. One day at a time. 🎯";
  return "Fresh slate. The only day that matters is today — hit your morning keys and build from there. 🚀";
}
function runOverview(){
  const s=overviewStats();
  const lines=[];
  lines.push('<div class="ai-line">📈 Your 7-day average is <b>'+s.avg+'%</b> across morning keys + daily habits.</div>');
  lines.push('<div class="ai-line">🔥 Current streak: <b>'+s.streak+' day'+(s.streak===1?'':'s')+'</b> hitting 50%+.</div>');
  if(s.strongest&&s.rate[s.strongest.id]>0) lines.push('<div class="ai-line">💪 Strongest: <b>'+s.strongest.emoji+' '+s.strongest.label+'</b> — '+s.rate[s.strongest.id]+'/7 days. Keep it locked.</div>');
  if(s.weakest&&s.rate[s.weakest.id]<4) lines.push('<div class="ai-line">⚠️ Slipping: <b>'+s.weakest.emoji+' '+s.weakest.label+'</b> — '+s.rate[s.weakest.id]+'/7 days. Attack that this week.</div>');
  lines.push('<div class="ai-line">📧 Demos out: <b>'+s.emailC+'/3</b> · 🚀 Releases: <b>'+s.releaseC+'/1</b> this week.</div>');
  if(s.emailC<3) lines.push('<div class="ai-line">→ '+(3-s.emailC)+' more demo email'+((3-s.emailC)===1?'':'s')+' to hit target. Send them.</div>');
  const out=document.getElementById('aiOut');
  out.innerHTML='<h3>🧠 Manager overview</h3>'+lines.join('')+
    '<div class="affirm-card"><div class="affirm-label">Today\'s reminder</div><div class="affirm-text">'+affirmFor(s.avg)+'</div></div>';
  out.classList.add('show');
}

/* ---------- ASSISTANT (local command parser) ---------- */
function botMsg(who,text){
  const log=document.getElementById('botLog');
  const div=document.createElement('div');
  div.className='bot-msg '+who; div.innerHTML=text;
  log.appendChild(div); log.scrollTop=log.scrollHeight;
}
function capitalize(s){return s.charAt(0).toUpperCase()+s.slice(1);}
function findHabitByText(q){
  q=q.toLowerCase().trim();
  const all=allHabits();
  let exact=all.filter(function(h){return h.label.toLowerCase()===q;})[0];
  if(exact) return exact;
  function words(s){return s.toLowerCase().split(/[^a-z0-9]+/).filter(Boolean);}
  const qw=words(q); let best=null,bestScore=0;
  all.forEach(function(h){
    const lw=words(h.label); let score=0;
    qw.forEach(function(a){ if(lw.some(function(b){return b===a||b.indexOf(a)===0||a.indexOf(b)===0;})) score++; });
    if(h.label.toLowerCase().indexOf(q)>-1) score+=1;
    if(score>bestScore){bestScore=score;best=h;}
  });
  return bestScore>0?best:null;
}
function sectionOf(id){
  var found=null;
  ['morning','daily','weekly','bonus'].forEach(function(s){
    if(BUILTIN[s].some(function(h){return h.id===id;})||(custom.added[s]||[]).some(function(h){return h.id===id;})) found=s;
  });
  return found;
}
function detectEmoji(str){
  try{ var m=str.match(/^([\u{1F000}-\u{1FAFF}\u{2600}-\u{27BF}\u{2190}-\u{21FF}\u{2B00}-\u{2BFF}\u{FE0F}\u{200D}]+)\s*/u);
    if(m) return {emoji:m[1],rest:str.slice(m[0].length)};
  }catch(e){}
  return {emoji:null,rest:str};
}
function botHandle(raw){
  const t=raw.trim(); const low=t.toLowerCase();
  if(low==='help'||low==='?'||low.indexOf('what can you')>-1){
    return "I edit your tracker. Try:<br>• <b>add cold shower to daily</b><br>• <b>add ☀️ stretch to morning</b><br>• <b>add cook to weekly 3</b><br>• <b>remove meditate</b><br>• <b>rename sax practice to horn</b><br>• <b>progress</b> — quick summary";
  }
  if(/^(how am i|progress|how'?s it going|overview|summary|how am i doing)/.test(low)){
    const s=overviewStats();
    return "📈 7-day avg <b>"+s.avg+"%</b> · 🔥 streak <b>"+s.streak+"d</b><br>"+
      (s.strongest&&s.rate[s.strongest.id]>0?("💪 strongest: "+s.strongest.label+" ("+s.rate[s.strongest.id]+"/7)<br>"):"")+
      (s.weakest&&s.rate[s.weakest.id]<4?("⚠️ slipping: "+s.weakest.label+" ("+s.rate[s.weakest.id]+"/7)<br>"):"")+
      "📧 demos "+s.emailC+"/3 · 🚀 releases "+s.releaseC+"/1<br><i>"+affirmFor(s.avg)+"</i>";
  }
  // ADD
  let m=t.match(/^(?:add|create|new)\s+(.+)$/i);
  if(m){
    let body=m[1]; let section='daily'; let target=null;
    const secM=body.match(/\s+to\s+(morning|daily|weekly|bonus)(?:\s+(\d+)\s*x?)?\s*$/i);
    if(secM){section=secM[1].toLowerCase(); if(secM[2])target=parseInt(secM[2]); body=body.slice(0,secM.index).trim();}
    const ej=detectEmoji(body); body=ej.rest.trim();
    if(!body) return "What should I call it? e.g. <b>add cold shower to daily</b>";
    const h={id:'custom_'+Date.now()+Math.floor(Math.random()*99),label:capitalize(body),emoji:ej.emoji||'⭐'};
    if(section==='morning') h.key=true;
    if(section==='weekly') h.target=target||3;
    custom.added[section].push(h); saveCustom(custom);
    return "✅ Added <b>"+h.emoji+" "+escapeHtml(h.label)+"</b> to "+section+(section==='weekly'?(" ("+h.target+"×/wk)"):"")+".";
  }
  // REMOVE
  m=t.match(/^(?:remove|delete|hide|drop|take off|get rid of)\s+(.+)$/i);
  if(m){
    const h=findHabitByText(m[1]);
    if(!h) return "Couldn't find a habit like \""+escapeHtml(m[1])+"\". Type <b>help</b> to see what I can do.";
    const sec=sectionOf(h.id);
    const customIdx=(custom.added[sec]||[]).findIndex(function(x){return x.id===h.id;});
    if(customIdx>-1){custom.added[sec].splice(customIdx,1);}
    else if(custom.hidden.indexOf(h.id)===-1){custom.hidden.push(h.id);}
    saveCustom(custom);
    return "🗑️ Removed <b>"+escapeHtml(h.label)+"</b>. (Your logged history is kept — say <b>add "+h.label.toLowerCase()+" to "+(sec||'daily')+"</b> to bring it back.)";
  }
  // RENAME
  m=t.match(/^rename\s+(.+?)\s+to\s+(.+)$/i);
  if(m){
    const h=findHabitByText(m[1]);
    if(!h) return "Couldn't find \""+escapeHtml(m[1])+"\" to rename.";
    const ej=detectEmoji(m[2].trim()); const newLabel=capitalize(ej.rest.trim());
    custom.renamed[h.id]=newLabel;
    if(ej.emoji){ // update emoji for custom habits
      ['morning','daily','weekly','bonus'].forEach(function(s){(custom.added[s]||[]).forEach(function(x){if(x.id===h.id)x.emoji=ej.emoji;});});
    }
    saveCustom(custom);
    return "✏️ Renamed to <b>"+escapeHtml(newLabel)+"</b>.";
  }
  return "Not sure on that one 🤔 — I can <b>add</b>, <b>remove</b>, or <b>rename</b> habits, or give you a <b>progress</b> summary. Type <b>help</b>.";
}
function botSend(){
  const inp=document.getElementById('botInput'); const t=inp.value.trim(); if(!t)return;
  botMsg('you',escapeHtml(t)); inp.value='';
  const reply=botHandle(t);
  setTimeout(function(){botMsg('bot',reply); render();},120);
}

/* ---------- MAIN RENDER ---------- */
function render(){
  document.getElementById('dateDisplay').textContent=currentDate.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'short'});
  const dd=getDayData(currentDate);
  const C=core();
  const keyHabits=C.filter(function(h){return h.key;});
  const keyDone=keyHabits.filter(function(h){return dd[h.id];}).length;
  const coreDone=C.filter(function(h){return dd[h.id];}).length;
  const pct=C.length?Math.round((coreDone/C.length)*100):0;

  document.getElementById('todayScore').textContent=pct+'%';
  document.getElementById('habitsCount').textContent=keyDone+'/'+keyHabits.length;
  document.getElementById('progressBar').style.width=pct+'%';
  document.getElementById('progressLabel').textContent=coreDone+' of '+C.length+' habits complete';
  document.getElementById('motiveLine').textContent=getMotiveLine(pct);

  let wt=0; for(let i=6;i>=0;i--){const d=new Date(currentDate);d.setDate(d.getDate()-i);wt+=calcScore(d);}
  document.getElementById('weekAvg').textContent=Math.round(wt/7)+'%';
  document.getElementById('bestStreak').textContent=calcStreak()+'d';

  document.getElementById('morningHabits').innerHTML=getSection('morning').map(function(h){return makeHabitHTML(h,dd,'morning');}).join('');
  document.getElementById('dailyHabits').innerHTML=getSection('daily').map(function(h){return makeHabitHTML(h,dd,'');}).join('');
  document.getElementById('weeklyHabits').innerHTML=getSection('weekly').map(function(h){return makeWeeklyHTML(h);}).join('');
  document.getElementById('bonusHabits').innerHTML=getSection('bonus').map(function(h){return makeHabitHTML(h,dd,'bonus');}).join('');
  renderTodos();
  if(document.getElementById('dashBody').classList.contains('open')) refreshDash();
}

applyTheme(loadTheme());
botMsg('bot',"Yo 👋 I can edit your tracker. Try <b>add cold shower to daily</b>, <b>remove meditate</b>, or <b>progress</b>. Type <b>help</b> anytime.");
render();
</script>
